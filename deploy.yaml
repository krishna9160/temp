apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy
spec:
  replicas: 20
  selector:          # ✅ required field
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:    # ✅ should be plural
        - name: mycont
          image: nginx
          ports:
            - containerPort: 80   # ✅ correct key
